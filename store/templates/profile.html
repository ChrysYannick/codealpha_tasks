{% extends 'base.html' %}

{% block content %}

<section class="profile-section">

    <div class="profile-card">

        <div class="profile-icon">

            <i class="bi bi-person-circle"></i>

        </div>
        <h2>
             {{ request.user.username }}
        </h2>


        <div class="profile-info">

            <div class="info-row">

                <span>Email</span>

                <strong>
                    {{ request.user.email }}
                </strong>

            </div>

            <div class="info-row">

                <span>Nom d'utilisateur</span>

                <strong>
                    {{ request.user.username }}
                </strong>

            </div>

            <div class="info-row">

                <span>Nombre de commandes</span>

                <strong>
                    {{ orders_count }}
                </strong>

            </div>

            <div class="info-row">

                <span>Membre depuis</span>

                <strong>
                    {{ request.user.date_joined|date:"d/m/Y" }}
                </strong>

            </div>

        </div>

        <div class="profile-actions">

            <a href="{% url 'my_orders' %}"
               class="profile-btn">

                Mes commandes

            </a>

            <a href="{% url 'logout' %}"
               class="logout-btn">

                Déconnexion

            </a>

        </div>

    </div>

</section>

{% endblock %}
